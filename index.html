<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issues Tracker</title>
    <!-- tailwind and daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="./style.css">
</head>

<body class="bg-[#F8FAFC]">

    <!-- login section -->
    <section class="flex items-center justify-center min-h-screen">
        <div class="bg-white w-96 px-5 py-5">
            <!-- header part -->
            <div class="text-center space-y-1">
                <img class="mx-auto w-16 h-16" src="./assets/github-logo.png" alt="">
                <h1 class="text-2xl font-bold">Github Issues Tracker</h1>
                <p>Sign in to manage your issues</p>
            </div>

            <div>
                <fieldset class="fieldset  border-base-300 rounded-box w-xs  p-4">
                   
                    <label class="label">User Name</label>
                    <input id="userInput" type="text" class="input" placeholder="Enter Username" />

                    <label class="label">Password</label>
                    <input id="userPassword" type="password" class="input" placeholder="Enter password" />

                    <button id="login-btn" class="btn btn-primary mt-4">Sign In</button>
                </fieldset>
            </div>


        </div>
    </section>

    <script src="./main.js"></script>
</body>

</html>
