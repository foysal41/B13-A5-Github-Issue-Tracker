<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issues Tracker</title>
    <!-- tailwind and daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="./style.css">
</head>

<body class="bg-[#F8FAFC]">

    <header>
        <div class="navbar  bg-base-100 shadow-sm">
            <div class="container mx-auto flex justify-between">

                <div class="">
                    <a class="btn btn-ghost text-xl"> <img class="h-10" src="./assets/github-logo.png " alt="">Github
                        Issues Tracker</a>
                </div>

                <div class="flex gap-2 justify-end">
                    <div>
                        <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
                    </div>

                    <div class="btn btn-ghost ">
                        <button class="btn btn-primary">New Issue</button>
                    </div>

                </div>

            </div>
        </div>
    </header>


    <section class="container mx-auto">
        <div class="w-[1600px]  mt-10 space-y-5">


            <div class="bg-white px-5 py-5">
                <button id="allBtn" class="btn btn-primary px-10 cursor-pointer">All</button>
                <button id="openBtn" class="btn btn-outline px-10 cursor-pointer">Open</button>
                <button id="closeBtn" class="btn btn-outline px-10 cursor-pointer">Closed</button>
            </div>

            <div class="bg-white px-5 py-5">
                <div class="flex justify-between">

                    <div class="flex  items-center gap-2">
                        <div>
                            <img src="./assets/Aperture.png" alt="">
                        </div>
                        <div class=" ">
                            <h3 id="totalIssuesCount" class="font-bold"></h3>
                            <p>Track and manage your project issues</p>
                        </div>
                    </div>

                    <div class="flex gap-5 ">
                        <div class="flex items-center gap-2">
                            <div class="h-2 w-2 rounded-full bg-[#00A96E]"></div>
                            <p>Open</p>
                        </div>

                        <div class="flex items-center gap-2">
                            <div class="h-2 w-2 rounded-full bg-[#A855F7]"></div>
                            <p>Closed</p>
                        </div>
                    </div>

                </div>
            </div>

            <span id="loader" class="loading loading-infinity loading-xl hidden"></span>

            <!-- modal -->
            <!-- Open the modal using ID.showModal() method -->
            <!-- <button class="btn" onclick="my_modal_1.showModal()">open modal</button> -->
            <dialog id="issueDetails" class="modal">
                <div class="modal-box bg-white rounded-lg shadow-md p-6">
                    <h2 id="issueTitle" class="text-lg font-semibold text-gray-800 mb-2"> </h2>

                    <div class="flex items-center gap-3  mb-4">
                        <span id="issueStatus" class="bg-green-100 text-green-500 text-xs px-4 py-1 rounded-full"> </span>

                        <span id="issueAuthor"  class="text-gray-500"> </span>

                        <span id="issueDate" class="text-gray-400"> </span>
                    </div>

                    <div id="issueLabels" class="flex gap-2 mb-4">
                       
                    </div>


                    <p id="issueExplained" class="py-4"> </p>

                    <div class="bg-gray-100 rounded-md p-4 flex justify-between items-center mb-6">

                        <div>
                            <p class=" text-gray-500">Assignee:</p>
                            <p id="issueAssignee" class=" font-medium text-gray-700"></p>
                        </div>

                        <div class="text-center">
                            <p class=" text-gray-500 mb-1">Priority:</p>
                           <span id="issuePriority" class="bg-red-100 text-red-500 text-xs px-4 py-1 rounded-full">
                            
                        </span>
                        </div>

                    </div>

                    <div class="modal-action">
                        <form method="dialog">
                            <!-- if there is a button in form, it will close the modal -->
                            <button class="btn">Close</button>
                        </form>
                    </div>
                </div>
            </dialog>

            <div id="issuesCardContainer" class="grid grid-cols-4">
                





            </div>


        </div>
    </section>

    <script src="./main.js"></script>
</body>

</html>
